apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  labels:
    app: recommendation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation
  template:
    metadata:
      labels:
        app: recommendation
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z eureka 8761 && nc -z mongodb 27017 && nc -z kafka 9092; do echo waiting; sleep 3; done']
      containers:
        - name: recommendation
          image: jinronara/coursematerials-recommendation:0.1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: coursematerials-env
            - secretRef:
                name: coursematerials-secret
                optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation
spec:
  selector:
    app: recommendation
  ports:
    - port: 8080
      targetPort: 8080
