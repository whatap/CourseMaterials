apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      initContainers:
        - name: wait-eureka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z eureka 8761; do echo waiting for eureka; sleep 3; done']
      containers:
        - name: gateway
          image: jinronara/coursematerials-gateway:0.1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: coursematerials-env
            - secretRef:
                name: coursematerials-secret
                optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "4"
              memory: "768Mi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
